{% extends "base.html" %}

{% block title %}Bookmark - 編集{% endblock %}
{% block body_class %}page-form{% endblock %}

{% block header_nav %}
<a href="/">← 戻る</a>
{% endblock %}

{% block content %}
<div class="form-container">
  <h1>ブックマークを編集</h1>
  <form action="/edit/{{ bookmark.id }}" method="post">
    <div>
      <label>タイトル *</label>
      <input type="text" name="title" value="{{ bookmark.title }}" required>
    </div>

    <div>
      <label>URL *</label>
      <input type="url" name="url" value="{{ bookmark.url }}" required>
    </div>

    <div>
      <label>タグ</label>
      <input type="text" name="tag" value="{{ bookmark.tag }}" list="tag-suggestions">
      <datalist id="tag-suggestions">
        {% for tag in tags %}<option value="{{ tag }}">{% endfor %}
      </datalist>
    </div>

    <div>
      <label>メモ</label>
      <textarea name="description" rows="3">{{ bookmark.description }}</textarea>
    </div>

    <div class="mt-10">
      <button type="submit" class="primary">更新内容を保存</button>
      <a href="/" class="button">キャンセル</a>
    </div>
  </form>
</div>
{% endblock %}

{% extends "base.html" %}

{% block title %}Bookmark - 追加{% endblock %}
{% block body_class %}page-form{% endblock %}

{% block header_nav %}
<a href="/">← 戻る</a>
{% endblock %}

{% block content %}
<div class="form-container">
  <h1>新しいブックマークを追加</h1>
  <form action="/add" method="post">
    <div>
      <label>タイトル *</label>
      <input type="text" name="title" required autofocus>
    </div>

    <div>
      <label>URL *</label>
      <input type="url" name="url" placeholder="https://..." required>
    </div>

    <div>
      <label>タグ（任意）</label>
      <input type="text" name="tag" list="tag-suggestions">
      <datalist id="tag-suggestions">
        {% for tag in tags %}<option value="{{ tag }}">{% endfor %}
      </datalist>
    </div>

    <div>
      <label>メモ（任意）</label>
      <textarea name="description" rows="3"></textarea>
    </div>

    <div class="mt-10">
      <button type="submit" class="primary">登録する</button>
      <a href="/" class="button">キャンセル</a>
    </div>
  </form>
</div>
{% endblock %}
